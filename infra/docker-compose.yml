version: '3.8'

networks:
  redis-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
        
services:
  redis-node-1:
    build: .
    image: my-ubuntu-ssh:v1
    container_name: redis-node-1
    ports:
      - "2222:22"
    networks:
      redis-net:
        ipv4_address: 10.10.0.11

  redis-node-2:
    build: .
    image: my-ubuntu-ssh:v1
    container_name: redis-node-2
    ports:
      - "2223:22"
